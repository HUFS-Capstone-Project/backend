services:
  postgres:
    image: postgres:17-alpine
    container_name: udidura-postgres
    environment:
      POSTGRES_DB: udidura
      POSTGRES_USER: udidura
      POSTGRES_PASSWORD: udidura
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - udidura_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U udidura -d udidura"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: udidura-redis
    ports:
      - "6379:6379"
    volumes:
      - udidura_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  udidura_pg_data:
  udidura_redis_data:
