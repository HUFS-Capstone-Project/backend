spring:
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:h2:mem:udidura;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-google-client-id
            client-secret: test-google-client-secret
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false

logging:
  level:
    root: warn

app:
  auth:
    jwt:
      secret-base64: VGhpc0lzQVN0cm9uZ0RlbW9TZWNyZXRLZXlGb3JVZGlkdXJhQmFja2VuZA==
    refresh:
      hash-secret: test-refresh-hash-secret
    cookie:
      refresh-cookie-name: udidura_rt
      oauth-context-cookie-name: udidura_octx
      secure: false
      domain:
    redirect:
      web-base-url: http://localhost:3000
      app-link-base-url: http://localhost:3000/callback

processing:
  base-url: http://localhost:8000
  internal-api-key: test-processing-internal-key
