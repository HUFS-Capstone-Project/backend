spring:
  application:
    name: udidura-backend

  mvc:
    problemdetails:
      enabled: true
  jpa:
    open-in-view: false
    properties:
      hibernate:
        default_batch_fetch_size: 100
        jdbc:
          time_zone: UTC
    show-sql: false
  security:
    oauth2:
      client:
        registration:
          google:
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

app:
  security:
    csrf:
      cookie:
        same-site: Lax
        secure: false
        path: /
  cors:
    allowed-methods:
      - GET
      - POST
      - PUT
      - PATCH
      - DELETE
      - OPTIONS
    allowed-headers:
      - Authorization
      - Content-Type
      - X-Requested-With
      - X-XSRF-TOKEN
      - X-Client-Platform
    exposed-headers: []
    allow-credentials: true
    max-age: 3600
  fastapi:
    connect-timeout-ms: 3000
    read-timeout-ms: 30000
  auth:
    jwt:
      issuer: udidura-backend
      audience: udidura-api
      access-token-ttl: 10m
    refresh:
      ttl: 30d
      token-bytes: 32
      rotation-replay-window: 15s
      cleanup-retention-days: 14
    cookie:
      http-only: true
      same-site: Lax
      refresh-path: /api/v1/auth
      oauth-context-path: /login/oauth2/code/google
      max-age-seconds: 2592000
    redirect:
      default-web-return-path: /auth/callback
      allowed-web-return-paths:
        - /auth/callback
        - /app
    one-time-code:
      ticket-ttl: 60s
      mobile-code-ttl: 60s
      replay-window: 20s
    redis:
      key-prefix: auth
