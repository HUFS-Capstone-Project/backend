spring:
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:true}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN:5}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false

logging:
  level:
    root: info
    com.hufs.capstone.backend: info

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

management:
  endpoint:
    health:
      show-details: never

server:
  servlet:
    session:
      cookie:
        same-site: None
        secure: true
        path: /

app:
  security:
    csrf:
      cookie:
        same-site: None
        secure: true
        path: /
  cors:
    allowed-origins:
      - https://udidura.vercel.app
    allow-credentials: true
  auth:
    jwt:
      issuer: ${AUTH_JWT_ISSUER:udidura-backend}
      audience: ${AUTH_JWT_AUDIENCE:udidura-api}
      secret-base64: ${AUTH_JWT_SECRET_BASE64}
    refresh:
      hash-secret: ${AUTH_REFRESH_HASH_SECRET}
    cookie:
      refresh-cookie-name: __Host-udidura_rt
      oauth-context-cookie-name: __Host-udidura_octx
      secure: true
      same-site: None
      domain:
    redirect:
      web-base-url: ${WEB_BASE_URL}
      app-link-base-url: ${APP_LINK_BASE_URL}

processing:
  base-url: ${PROCESSING_BASE_URL}
  internal-api-key: ${PROCESSING_INTERNAL_API_KEY}
  connect-timeout-ms: ${PROCESSING_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${PROCESSING_READ_TIMEOUT_MS:30000}
